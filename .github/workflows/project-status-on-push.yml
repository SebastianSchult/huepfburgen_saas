name: Project Status On Push

on:
  push:
    branches-ignore:
      - main
      - develop

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  move-ticket-to-review:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issue to Review
        uses: actions/github-script@v7
        env:
          PROJECT_AUTOMATION_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
        with:
          github-token: ${{ github.token }}
          script: |
            try {
              const projectId = "PVT_kwHOCUUiJM4BRvo_";
              const statusFieldId = "PVTSSF_lAHOCUUiJM4BRvo_zg_e3NI";
              const reviewOptionId = "f769e6a8";
              const projectToken = process.env.PROJECT_AUTOMATION_TOKEN;

              if (!projectToken) {
                core.setFailed(
                  "Missing secret PROJECT_AUTOMATION_TOKEN. Add a PAT (classic) with scopes: repo, project."
                );
                return;
              }

              const projectGithub = github.getOctokit(projectToken);

              const branch = context.ref.replace("refs/heads/", "");
              const match = branch.match(/^(\d+)-/);

              if (!match) {
                core.info(`Branch '${branch}' does not start with an issue number. Skipping.`);
                return;
              }

              const issueNumber = Number(match[1]);
              const owner = context.repo.owner;
              const repo = context.repo.repo;

              const issueData = await github.graphql(
                `
                query($owner: String!, $repo: String!, $issueNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $issueNumber) {
                      id
                      number
                      title
                    }
                  }
                }
                `,
                { owner, repo, issueNumber }
              );

              const issue = issueData.repository?.issue;
              if (!issue) {
                core.info(`No issue #${issueNumber} found in ${owner}/${repo}. Skipping.`);
                return;
              }

              let hasNextPage = true;
              let cursor = null;
              let itemId = null;

              while (hasNextPage && !itemId) {
                const projectData = await projectGithub.graphql(
                  `
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            id
                            content {
                              ... on Issue {
                                id
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                  `,
                  { projectId, cursor }
                );

                const items = projectData.node?.items?.nodes ?? [];
                const matchItem = items.find((item) => item.content?.id === issue.id);
                if (matchItem) {
                  itemId = matchItem.id;
                  break;
                }

                hasNextPage = projectData.node?.items?.pageInfo?.hasNextPage ?? false;
                cursor = projectData.node?.items?.pageInfo?.endCursor ?? null;
              }

              if (!itemId) {
                const addData = await projectGithub.graphql(
                  `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                      item {
                        id
                      }
                    }
                  }
                  `,
                  { projectId, contentId: issue.id }
                );
                itemId = addData.addProjectV2ItemById.item.id;
                core.info(`Added issue #${issueNumber} to project.`);
              }

              await projectGithub.graphql(
                `
                mutation($projectId: ID!, $itemId: ID!, $statusFieldId: ID!, $reviewOptionId: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $statusFieldId
                      value: { singleSelectOptionId: $reviewOptionId }
                    }
                  ) {
                    projectV2Item {
                      id
                    }
                  }
                }
                `,
                { projectId, itemId, statusFieldId, reviewOptionId }
              );

              core.info(`Moved issue #${issueNumber} to Review.`);
            } catch (error) {
              const message = error?.message ?? String(error);
              if (message.includes("Resource not accessible by integration")) {
                core.setFailed(
                  "PROJECT_AUTOMATION_TOKEN has insufficient access to the project. Use a token with project scope and repository access."
                );
                return;
              }
              core.setFailed(`Project automation failed: ${message}`);
            }
