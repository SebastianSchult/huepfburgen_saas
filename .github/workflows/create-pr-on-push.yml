name: Auto Create PR On Push

on:
  push:
    branches-ignore:
      - main
      - develop

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR for ticket branch
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const baseBranch = "develop";
            const branch = context.ref.replace("refs/heads/", "");
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Only ticket branches like "11-some-title" should auto-create PRs.
            const match = branch.match(/^(\d+)-/);
            if (!match) {
              core.info(`Branch '${branch}' is not a ticket branch. Skipping PR creation.`);
              return;
            }

            const issueNumber = Number(match[1]);
            const headRefWithOwner = `${owner}:${branch}`;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: headRefWithOwner,
              base: baseBranch,
              per_page: 1
            });

            if (existing.data.length > 0) {
              core.info(`PR already exists: ${existing.data[0].html_url}`);
              return;
            }

            let prTitle = branch;
            let issueTitle = "";

            try {
              const issueResp = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber
              });
              issueTitle = issueResp.data.title;
              prTitle = `[#${issueNumber}] ${issueTitle}`;
            } catch (error) {
              core.warning(`Could not load issue #${issueNumber}. Using fallback PR title.`);
            }

            const prBodyLines = [
              "## Summary",
              "- Automated PR creation from ticket branch push.",
              "- Base branch: `develop`.",
              "",
              "## Linked Issue",
              `Closes #${issueNumber}`
            ];

            if (issueTitle) {
              prBodyLines.splice(1, 0, `- Issue title: ${issueTitle}`);
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: prTitle,
              head: branch,
              base: baseBranch,
              body: prBodyLines.join("\n")
            });

            core.info(`Created PR: ${created.data.html_url}`);
