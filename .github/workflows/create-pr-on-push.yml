name: Auto Create Or Update PR On Push

on:
  push:
    branches-ignore:
      - main
      - develop

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR automation token
        env:
          PROJECT_AUTOMATION_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$PROJECT_AUTOMATION_TOKEN" ]; then
            echo "::error::Missing secret PROJECT_AUTOMATION_TOKEN. Add a PAT (classic) with scopes: repo, project."
            exit 1
          fi

      - name: Create or update PR for ticket branch
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            try {
              const baseBranch = "develop";
              const branch = context.ref.replace("refs/heads/", "");
              const owner = context.repo.owner;
              const repo = context.repo.repo;

              // Only ticket branches like "11-some-title" should auto-create PRs.
              const match = branch.match(/^(\d+)-/);
              if (!match) {
                core.info(`Branch '${branch}' is not a ticket branch. Skipping PR creation.`);
                return;
              }

              const issueNumber = Number(match[1]);
              const headRefWithOwner = `${owner}:${branch}`;

              const existing = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: headRefWithOwner,
                base: baseBranch,
                per_page: 1
              });

              let prTitle = branch;
              let issueTitle = "";

              try {
                const issueResp = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber
                });
                issueTitle = issueResp.data.title;
                prTitle = `[#${issueNumber}] ${issueTitle}`;
              } catch (error) {
                core.warning(`Could not load issue #${issueNumber}. Using fallback PR title.`);
              }

              let commits = [];
              let files = [];
              try {
                const compare = await github.rest.repos.compareCommitsWithBasehead({
                  owner,
                  repo,
                  basehead: `${baseBranch}...${branch}`
                });
                commits = compare.data.commits ?? [];
                files = compare.data.files ?? [];
              } catch (error) {
                core.warning("Could not build commit/file summary from compare API.");
              }

              const additions = files.reduce((sum, file) => sum + (file.additions ?? 0), 0);
              const deletions = files.reduce((sum, file) => sum + (file.deletions ?? 0), 0);

              const commitLines =
                commits.length > 0
                  ? commits.slice(0, 20).map((commit) => {
                      const title = commit.commit.message.split("\n")[0];
                      return `- ${title} (\`${commit.sha.slice(0, 7)}\`)`;
                    })
                  : ["- No commit summary available yet."];

              if (commits.length > 20) {
                commitLines.push(`- ...and ${commits.length - 20} more commits.`);
              }

              const fileLines =
                files.length > 0
                  ? files.slice(0, 40).map((file) => {
                      return `- \`${file.filename}\` (${file.status}, +${file.additions ?? 0}/-${file.deletions ?? 0})`;
                    })
                  : ["- No file change summary available yet."];

              if (files.length > 40) {
                fileLines.push(`- ...and ${files.length - 40} more files.`);
              }

              const prBodyLines = [
                "## Summary",
                "- Automated PR create/update from ticket branch push.",
                "- Base branch: `develop`.",
                issueTitle ? `- Issue title: ${issueTitle}` : "- Issue title: n/a",
                "",
                "## What Was Done",
                ...commitLines,
                "",
                "## Changed Files",
                ...fileLines,
                "",
                "## Change Stats",
                `- Files changed: ${files.length}`,
                `- Additions: ${additions}`,
                `- Deletions: ${deletions}`,
                "",
                "## Linked Issue",
                `Related to #${issueNumber}`
              ];
              const prBody = prBodyLines.join("\n");

              if (existing.data.length > 0) {
                const pull = existing.data[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pull.number,
                  title: prTitle,
                  body: prBody
                });
                core.info(`PR already exists and was updated: ${pull.html_url}`);
                return;
              }

              const created = await github.rest.pulls.create({
                owner,
                repo,
                title: prTitle,
                head: branch,
                base: baseBranch,
                body: prBody
              });

              core.info(`Created PR: ${created.data.html_url}`);
            } catch (error) {
              const message = error?.message ?? String(error);
              if (message.includes("not permitted to create or approve pull requests")) {
                core.setFailed(
                  "Token cannot create PRs. Ensure PROJECT_AUTOMATION_TOKEN has repo scope and is correctly stored as repository secret."
                );
                return;
              }
              core.setFailed(`Auto PR creation failed: ${message}`);
            }
